spring.application.name=gestao-ati
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gestao_ati}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gestao_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gestao123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:chave-super-secreta-gestao-ati-2024-deve-ter-256-bits-minimo}
jwt.expiration=${JWT_EXPIRATION:86400000}

springdoc.enable-hateoas=false

server.forward-headers-strategy=framework